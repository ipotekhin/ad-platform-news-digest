# sources.yaml — validated entry points for Routine 1 (Collect)
#
# Each source is a stable blog INDEX / announcements page. Routine 1 starts here
# and follows the fresh links; it never relies on hard-coded article URLs.
#
# Fields:
#   key         Stable identifier. MUST match the key used in data/state.json.
#   platform    google_ads | meta | tiktok | linkedin | bing
#   title       Human-readable source name (goes into updates.json -> "source").
#   url         Entry point (index / announcements page).
#   type        official | aggregator
#                 official   = the platform's own blog. Preferred canonical record.
#                 aggregator = 3rd-party (Search Engine Land / SocialBee). Often
#                              repeats official stories -> resolved by dedup Layer 2.
#   validation  readable = plain in-session fetch returns real, dated article text.
#                 Every source below was confirmed readable on 2026-07-21. Sources
#                 that could not be read were dropped and are intentionally not listed.
#   note        Free-text guidance for the routine.
#
# FETCH METHOD (important): fetch pages with an in-session client (curl / requests /
# browser), NOT the managed WebFetch tool. With egress open, curl gets HTTP 200 from
# every domain, but WebFetch's fetcher is blocked by the sites' anti-bot (403). Read
# dates/titles from each article's JSON-LD ("datePublished") and og: meta tags.
# Re-validate on drift.

sources:
  # ── Google ──────────────────────────────────────────────────────────────────
  - key: google_ads_commerce_blog
    platform: google_ads
    title: Google Ads & Commerce Blog
    url: https://blog.google/products/ads-commerce/
    type: official
    validation: readable
    note: Primary Google Ads source. Server-rendered; article links + JSON-LD dates
      read fine via curl (verified article dated 2026-07-13).

  - key: google_ads_announcements
    platform: google_ads
    title: Google Ads Help — New Features & Announcements
    url: https://support.google.com/google-ads/announcements/9048695?hl=en
    type: official
    validation: readable
    note: Official product announcements. Large server-rendered page, all entries
      inline (verified). High signal-to-noise for features.

  - key: searchengineland_google
    platform: google_ads
    title: Search Engine Land — Google
    url: https://searchengineland.com/library/platforms/google
    type: aggregator
    validation: readable
    note: ~50 article links with JSON-LD dates (verified article dated 2026-07-17).
      Overlaps official Google sources; prefer official as canonical on dedup. NB the
      top links are a site-wide recent/popular block — pick platform-specific items.

  # ── Meta ────────────────────────────────────────────────────────────────────
  - key: meta_newsroom_tech
    platform: meta
    title: Meta Newsroom — Technologies
    url: https://about.fb.com/news/category/technologies/
    type: official
    validation: readable
    note: Server-rendered newsroom; ~14 article links + JSON-LD dates (verified article
      dated 2026-07-21). Filter HARD — much is non-ads (consumer/policy/PR).

  - key: searchengineland_meta
    platform: meta
    title: Search Engine Land — Meta
    url: https://searchengineland.com/library/platforms/meta
    type: aggregator
    validation: readable
    note: ~55 article links with dates (verified). Primary practical Meta-ads source.

  # ── TikTok ──────────────────────────────────────────────────────────────────
  - key: searchengineland_tiktok
    platform: tiktok
    title: Search Engine Land — TikTok
    url: https://searchengineland.com/library/platforms/tiktok
    type: aggregator
    validation: readable
    note: ~57 article links with dates (verified). Primary practical TikTok-ads source.

  # ── LinkedIn ────────────────────────────────────────────────────────────────
  - key: socialbee_linkedin_updates
    platform: linkedin
    title: SocialBee — LinkedIn Updates
    url: https://socialbee.com/blog/linkedin-updates/
    type: aggregator
    validation: readable
    note: Verified 2026-07-21 via curl (HTTP 200). Format is a MONTHLY roundup —
      sections like "July 2026 LinkedIn updates", "June 2026 LinkedIn updates" with
      in-text dates (e.g. July 8 & 16, 2026) and a JSON-LD dateModified. Routine 1
      should parse the newest month section(s) and treat each bullet as a candidate
      item (id = source + month + sha1(title)); filter to ad/Campaign-Manager items
      per criteria.md. Covers general LinkedIn changes too — filter hard.

  # ── Bing / Microsoft Advertising ────────────────────────────────────────────
  - key: bing_blogs
    platform: bing
    title: Bing Blogs
    url: https://blogs.bing.com/search?page=1
    type: official
    validation: readable
    note: Server-rendered; article text + <time> tags present (verified). Broad
      Bing/search news — filter for Microsoft Advertising relevance.

  - key: searchengineland_microsoft
    platform: bing
    title: Search Engine Land — Microsoft Advertising
    url: https://searchengineland.com/library/platforms/microsoft/microsoft-advertising
    type: aggregator
    validation: readable
    note: ~62 article links with dates (verified). Often higher signal for Microsoft
      Ads than the broad Bing blog.
