<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ad Platform News Digest</title>
<!--
  SELF-CONTAINED DECK TEMPLATE — used by Routine 2 (Presentation).

  HOW ROUTINE 2 USES THIS FILE:
    1. Copy this file to decks/deck-YYYY-MM-DD.html
    2. Replace the single line  <script id="deck-data" ...> ... </script>
       with a filled-in DECK_DATA object (schema documented in that block below).
    3. Nothing else needs editing. All rendering is data-driven.

  The deck is one HTML file with zero external requests — safe for GitHub Pages,
  it is served from GitHub Pages (linked, not attached), and it prints cleanly to PDF
  (Cmd/Ctrl-P -> Save as PDF, one item per page).
-->
<style>
  :root{
    --bg:#f7f8fa; --card:#ffffff; --ink:#14161a; --muted:#5b6472;
    --line:#e5e8ee; --accent:#3b82f6;
    --high:#dc2626; --medium:#d97706; --low:#64748b;
    --chip-bg:#eef2ff; --chip-ink:#3730a3;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1116; --card:#171b22; --ink:#e8eaed; --muted:#9aa4b2;
      --line:#262c36; --accent:#60a5fa;
      --high:#f87171; --medium:#fbbf24; --low:#94a3b8;
      --chip-bg:#1e2333; --chip-ink:#a5b4fc;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:40px 24px 96px}
  header.masthead{margin-bottom:28px}
  .kicker{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
  h1{font-size:34px;line-height:1.15;margin:.25em 0 .1em}
  .subtitle{color:var(--muted);font-size:16px}
  .released{display:inline-block;margin-top:10px;font-size:13px;font-weight:600;
    letter-spacing:.02em;color:var(--chip-ink);background:var(--chip-bg);
    padding:5px 12px;border-radius:999px}
  .summary-callout{
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);
    border-radius:12px;padding:18px 20px;margin:22px 0 34px;
  }
  .summary-callout h2{font-size:15px;margin:0 0 8px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .summary-callout ul{margin:0;padding-left:20px}
  .summary-callout li{margin:4px 0}
  section.platform{margin:0 0 30px}
  section.platform > h2{
    font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);padding-bottom:8px;margin:0 0 16px;
  }
  .item{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin:0 0 14px;break-inside:avoid;
  }
  .item-top{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
  .item-title{font-size:18px;font-weight:650;margin:0;flex:1 1 auto;min-width:60%}
  .item-title a{color:inherit;text-decoration:none;border-bottom:1px solid transparent}
  .item-title a:hover{border-bottom-color:var(--accent)}
  .chip{font-size:12px;font-weight:650;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .chip.cat{background:var(--chip-bg);color:var(--chip-ink)}
  .chip.impact-high{background:color-mix(in srgb,var(--high) 16%,transparent);color:var(--high)}
  .chip.impact-medium{background:color-mix(in srgb,var(--medium) 18%,transparent);color:var(--medium)}
  .chip.impact-low{background:color-mix(in srgb,var(--low) 18%,transparent);color:var(--low)}
  .item-meta{font-size:13px;color:var(--muted);margin-bottom:8px}
  .item-date{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .item-summary{margin:0}
  footer.credits{margin-top:40px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}
  .empty{color:var(--muted);font-style:italic}
  @media print{
    body{background:#fff}
    .item,.summary-callout{border-color:#ccc}
    .wrap{padding-top:16px}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <div class="kicker" id="d-kicker">Ad Platform News Digest</div>
      <h1 id="d-title">Bi-weekly Update</h1>
      <div class="subtitle" id="d-subtitle"></div>
      <div class="released" id="d-released"></div>
    </header>

    <div class="summary-callout" id="d-tldr-wrap">
      <h2>📌 TL;DR</h2>
      <ul id="d-tldr"></ul>
    </div>

    <main id="d-body"></main>

    <footer class="credits" id="d-footer"></footer>
  </div>

  <!-- ─────────────────────────────────────────────────────────────────────────
       DECK_DATA — Routine 2 replaces the contents of this script block.
       Schema:
       {
         "period_label": "Jul 7 – Jul 21, 2026",   // window covered
         "generated": "2026-07-21",                  // ISO date deck was built
         "tldr": ["one-line highlight", "..."],      // 3–5 bullets, most important first
         "platforms": [                              // ordered; empty ones omitted
           {
             "name": "Google Ads",
             "items": [
               {
                 "title": "…",
                 "url": "https://…",
                 "source": "Google Ads & Commerce Blog",
                 "published": "2026-07-14",
                 "category": "feature",              // feature|beta|policy|deprecation|measurement|api|other
                 "impact": "high",                   // high|medium|low
                 "summary": "2–3 sentences."
               }
             ]
           }
         ]
       }
       Items within a platform should be ordered high -> medium -> low impact.
  ────────────────────────────────────────────────────────────────────────── -->
  <script id="deck-data" type="application/json">
  {
    "period_label": "SAMPLE — replace me",
    "generated": "2026-07-21",
    "tldr": [
      "This is the deck template with placeholder data.",
      "Routine 2 replaces the #deck-data JSON with the real digest."
    ],
    "platforms": [
      {
        "name": "Google Ads",
        "items": [
          {
            "title": "Example: New Performance Max control rolls out",
            "url": "https://blog.google/products/ads-commerce/",
            "source": "Google Ads & Commerce Blog",
            "published": "2026-07-14",
            "category": "feature",
            "impact": "high",
            "summary": "Placeholder summary. Two to three sentences describing what changed and why a PPC specialist should care."
          }
        ]
      }
    ]
  }
  </script>

  <script>
  (function(){
    var data;
    try { data = JSON.parse(document.getElementById('deck-data').textContent); }
    catch(e){ data = {period_label:'(invalid deck data)', tldr:[], platforms:[]}; }

    var CAT = {feature:'✨ Feature',beta:'🧪 Beta',policy:'📋 Policy',deprecation:'⚠️ Deprecation',
               measurement:'📊 Measurement',api:'🔌 API',other:'📰 Update'};
    var PLAT_EMOJI = {google:'🔍',meta:'📘',tiktok:'🎵',linkedin:'💼',microsoft:'🟦',bing:'🟦'};
    function platEmoji(name){var n=(name||'').toLowerCase();for(var k in PLAT_EMOJI){if(n.indexOf(k)>=0)return PLAT_EMOJI[k];}return '📣';}

    function el(tag, cls, html){var n=document.createElement(tag);if(cls)n.className=cls;if(html!=null)n.innerHTML=html;return n;}
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

    document.getElementById('d-subtitle').textContent =
      data.period_label ? ('Updates published ' + data.period_label) : '';
    var kick = document.getElementById('d-kicker');
    kick.textContent = 'Ad Platform News Digest';
    var rel = document.getElementById('d-released');
    if(data.generated){ rel.textContent = 'Released ' + data.generated; }
    else { rel.style.display = 'none'; }

    // TL;DR
    var tldr = document.getElementById('d-tldr');
    if(data.tldr && data.tldr.length){
      data.tldr.forEach(function(t){ tldr.appendChild(el('li', null, esc(t))); });
    } else {
      document.getElementById('d-tldr-wrap').style.display='none';
    }

    // Body: platform sections
    var body = document.getElementById('d-body');
    var platforms = (data.platforms||[]).filter(function(p){return p.items && p.items.length;});
    if(!platforms.length){
      body.appendChild(el('p','empty','No qualifying updates in this period.'));
    }
    platforms.forEach(function(p){
      var sec = el('section','platform');
      sec.appendChild(el('h2', null, platEmoji(p.name) + ' ' + esc(p.name)));
      p.items.forEach(function(it){
        var card = el('div','item');
        var top = el('div','item-top');
        var titleHtml = it.url
          ? '<a href="'+esc(it.url)+'" target="_blank" rel="noopener">'+esc(it.title)+'</a>'
          : esc(it.title);
        top.appendChild(el('h3','item-title', titleHtml));
        top.appendChild(el('span','chip cat', esc(CAT[it.category]||CAT.other)));
        var imp = (it.impact||'low').toLowerCase();
        top.appendChild(el('span','chip impact-'+imp, imp.toUpperCase()));
        card.appendChild(top);
        var metaHtml = (it.published ? '<span class="item-date">'+esc(it.published)+'</span>' : '') +
          (it.published && it.source ? ' · ' : '') + (it.source ? esc(it.source) : '');
        card.appendChild(el('div','item-meta', metaHtml));
        card.appendChild(el('p','item-summary', esc(it.summary)));
        sec.appendChild(card);
      });
      body.appendChild(sec);
    });

    // Footer
    var n = platforms.reduce(function(a,p){return a+p.items.length;},0);
    document.getElementById('d-footer').textContent =
      n + ' update' + (n===1?'':'s') + ' · Generated by ' + (data.author || 'Ivan Potekhin');
    document.title = 'Ad Platform News Digest — ' + (data.period_label||'');
  })();
  </script>
</body>
</html>
